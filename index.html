<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Online Test</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a2342;
  color: white;
  overflow: hidden;
}

/* START SCREEN */
#warningScreen {
  position: fixed;
  inset: 0;
  background: #0a2342;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  text-align: center;
}

#startBtn {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  background: #00b894;
  color: white;
  margin-top: 20px;
}

/* TIMER */
#timer {
  position: fixed;
  top: 10px;
  right: 280px;
  background: black;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 22px;
  z-index: 1000;
}

/* EXAM AREA */
iframe {
  width: calc(100% - 260px);
  height: 100vh;
  border: none;
}

/* RIGHT LOG */
#logBox {
  position: fixed;
  top: 0;
  right: 0;
  width: 260px;
  height: 100vh;
  background: black;
  color: #00ff00;
  padding: 10px;
  font-size: 12px;
  z-index: 2000;
  overflow-y: auto;
  box-sizing: border-box;
}

#logBox b {
  display: block;
  margin-bottom: 10px;
  font-size: 14px;
  color: white;
}

/* EXIT */
#exitWrapper {
  position: fixed;
  right: 280px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 999999;
  display: none;
  flex-direction: column;
  align-items: center;
}

#exitWarningText {
  background: #ffd700;
  color: black;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  width: 180px;
  text-align: center;
  font-weight: bold;
}

#exitTestBtn {
  padding: 15px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  width: 180px;
}

/* 🔴 TAB SWITCH WARNING (MOBILE ONLY) */
#tabWarning {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  color: white;
  padding: 15px 25px;
  border-radius: 10px;
  font-weight: bold;
  z-index: 99999;
  display: none;
}

/* MOBILE FIX */
@media (max-width: 768px) {

  #logBox {
    display: none;
  }

  iframe {
    width: 100%;
  }

  #timer {
    right: 20px;
  }

  #exitWrapper {
    right: 20px;
  }
}

</style>
</head>

<body>

<div id="warningScreen">
  <h1>Secure Online Test</h1>
  <p>
    • 40-minute timer<br><br>
    • No tab switching allowed<br><br>
    • Fullscreen used where supported
  </p>
  <button id="startBtn">Start Test</button>
</div>

<div id="timer">40:00</div>

<!-- TAB WARNING (mobile only) -->
<div id="tabWarning">⚠ You switched tabs. Please return to the test.</div>

<div id="exitWrapper">
  <div id="exitWarningText">Submit your assessment before exiting.</div>
  <button id="exitTestBtn">Exit Test</button>
</div>

<!-- LOG -->
<div id="logBox">
  <b>Activity Log</b>
  <div id="logContent"></div>
</div>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScJkedBESwkGo2fnUQbkH_H-w9hvD4iN27I-5ca4h8pN3HuAg/viewform?embedded=true"></iframe>

<script>

// -------- DEVICE DETECTION --------
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const supportsFullscreen = !!document.documentElement.requestFullscreen;

// -------- VARIABLES --------
let timeLeft = 40 * 60;
let tabSwitchCount = 0;
let maxViolations = 3;
let allowExit = false;
let activityLog = [];

// -------- ELEMENTS --------
const startBtn = document.getElementById("startBtn");
const warningScreen = document.getElementById("warningScreen");
const timerDisplay = document.getElementById("timer");
const exitWrapper = document.getElementById("exitWrapper");
const tabWarning = document.getElementById("tabWarning");

// -------- LOG --------
function logEvent(event){
  let t = new Date().toLocaleTimeString();
  activityLog.push(`${t} - ${event}`);
  document.getElementById("logContent").innerHTML =
    activityLog.join("<br>");
}

// -------- FULLSCREEN --------
function enterFullscreen() {
  return document.documentElement.requestFullscreen?.().catch(()=>{});
}

function exitFullscreenSafe() {
  document.exitFullscreen?.().catch(()=>{});
}

// -------- START --------
startBtn.addEventListener("click", async () => {

  warningScreen.style.display = "none";
  exitWrapper.style.display = "flex";

  if (!isMobile && supportsFullscreen) {
    await enterFullscreen();
    logEvent("Fullscreen enabled");
  } else {
    logEvent("Fullscreen skipped (mobile/unsupported)");
  }

  startTimer();
  logEvent("Test started");
});

// -------- TIMER --------
function startTimer() {
  setInterval(() => {

    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;

    timerDisplay.textContent =
      `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    timeLeft--;

    if(timeLeft < 0){
      submitTest("Time expired");
    }

  },1000);
}

// -------- FULLSCREEN EXIT DETECTION --------
document.addEventListener("fullscreenchange", () => {

  if (!isMobile && supportsFullscreen) {
    if (!document.fullscreenElement && !allowExit) {
      alert("Fullscreen exited.");
      logEvent("Fullscreen exited");
    }
  }
});

// -------- TAB SWITCH (UPDATED) --------
document.addEventListener("visibilitychange", () => {

  if (document.hidden && !allowExit) {

    tabSwitchCount++;
    logEvent("Tab switch detected");

    if (!isMobile && supportsFullscreen) {
      // Desktop: alert only
      alert(`Warning (${tabSwitchCount}/${maxViolations})`);
    } 
    else {
      // Mobile: banner warning
      tabWarning.style.display = "block";

      setTimeout(() => {
        tabWarning.style.display = "none";
      }, 4000);
    }

    if (tabSwitchCount >= maxViolations) {
      submitTest("Too many tab switches");
    }
  }
});

// -------- EXIT --------
document.getElementById("exitTestBtn").addEventListener("click", () => {

  if (!confirm("Exit test?")) return;

  submitTest("Clean exit");
});

// -------- SUBMIT --------
function submitTest(reason){

  allowExit = true;
  exitFullscreenSafe();

  logEvent("Test ended: " + reason);

  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0a2342;
      color:white;
      font-size:22px;
      text-align:center;
      flex-direction:column;
    ">
      <h1>Thank You</h1>
      <p>Thank you for submitting your work.</p>
    </div>
  `;
}

</script>

</body>
</html>
