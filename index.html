<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Online Test</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a2342;
  color: white;
  overflow: hidden;
}

/* START SCREEN */
#warningScreen {
  position: fixed;
  inset: 0;
  background: #0a2342;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  text-align: center;
}

#startBtn {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  background: #00b894;
  color: white;
  margin-top: 20px;
}

/* TIMER */
#timer {
  position: fixed;
  top: 10px;
  right: 280px;
  background: black;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 22px;
  z-index: 1000;
}

/* WARNING COUNTER */
#warningCounter {
  position: fixed;
  top: 60px;
  right: 280px;
  background: #222;
  padding: 8px 15px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 1000;
}

/* EXAM */
iframe {
  width: calc(100% - 260px);
  height: 100vh;
  border: none;
}

/* LOG */
#logBox {
  position: fixed;
  top: 0;
  right: 0;
  width: 260px;
  height: 100vh;
  background: black;
  color: #00ff00;
  padding: 10px;
  font-size: 12px;
  overflow-y: auto;
}

#logBox b {
  display: block;
  margin-bottom: 10px;
  color: white;
}

/* EXIT */
#exitWrapper {
  position: fixed;
  right: 300px;
  top: 50%;
  transform: translateY(-50%);
  display: none;
  flex-direction: column;
  align-items: center;
  z-index: 9999;
}

#exitWarningText {
  background: #ffd700;
  color: black;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  width: 180px;
  text-align: center;
  font-weight: bold;
}

#exitTestBtn {
  padding: 15px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  width: 180px;
}

#exitTestBtn:disabled {
  background: grey;
  cursor: not-allowed;
  opacity: 0.6;
}

/* FULLSCREEN BLOCK */
#controlPanel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  z-index: 99999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#reenterBtn {
  font-size: 28px;
  padding: 30px 50px;
  background: red;
  color: white;
  border: none;
  border-radius: 15px;
}

/* TAB WARNING */
#tabWarning {
  position: fixed;
  top: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  padding: 15px 25px;
  border-radius: 10px;
  display: none;
  z-index: 99999;
}

/* MOBILE */
@media (max-width: 768px) {

  #logBox {
    display: none;
  }

  iframe {
    width: 100%;
  }

  #timer {
    right: 20px;
  }

  #warningCounter {
    right: 20px;
  }

  #exitWrapper {
    right: 20px;
  }
}
</style>
</head>

<body>

<!-- START -->
<div id="warningScreen">
  <h1>Secure Online Test</h1>
  <p>
    • 40-minute timer<br><br>
    • No tab switching allowed<br><br>
    • Fullscreen required on desktop
  </p>
  <button id="startBtn">Start Test</button>
</div>

<div id="timer">40:00</div>
<div id="warningCounter">Warnings: 0 / 3</div>
<div id="tabWarning">⚠ You switched tabs. Return to the test.</div>

<!-- EXIT -->
<div id="exitWrapper">
  <div id="exitWarningText">Submit your assessment before exiting.</div>

  <label style="font-size:14px; margin-bottom:10px;">
    <input type="checkbox" id="confirmSubmit">
    I have submitted my form
  </label>

  <button id="exitTestBtn" disabled>Exit Test</button>
</div>

<!-- FULLSCREEN BLOCK -->
<div id="controlPanel">
  <h1>Fullscreen Required</h1>
  <p>Please return to fullscreen to continue</p>
  <button id="reenterBtn">RETURN TO FULLSCREEN</button>
</div>

<!-- LOG -->
<div id="logBox">
  <b>Activity Log</b>
  <div id="logContent"></div>
</div>

<!-- FORM -->
<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScJkedBESwkGo2fnUQbkH_H-w9hvD4iN27I-5ca4h8pN3HuAg/viewform?embedded=true​"></iframe>

<script>

// DEVICE
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const supportsFullscreen = !!document.documentElement.requestFullscreen;

// VARIABLES
let timeLeft = 40 * 60;
let tabSwitchCount = 0;
let maxViolations = 3;
let allowExit = false;

// ELEMENTS
const controlPanel = document.getElementById("controlPanel");
const tabWarning = document.getElementById("tabWarning");
const exitBtn = document.getElementById("exitTestBtn");
const confirmBox = document.getElementById("confirmSubmit");

// LOG
function logEvent(msg){
  let t = new Date().toLocaleTimeString();
  document.getElementById("logContent").innerHTML += `${t} - ${msg}<br>`;
}

// UPDATE WARNING COUNTER
function updateWarningDisplay() {
  document.getElementById("warningCounter").textContent =
    `Warnings: ${tabSwitchCount} / ${maxViolations}`;
}

// START
document.getElementById("startBtn").onclick = async () => {

  document.getElementById("warningScreen").style.display = "none";
  document.getElementById("exitWrapper").style.display = "flex";

  if (!isMobile && supportsFullscreen) {
    await document.documentElement.requestFullscreen().catch(()=>{});
    logEvent("Fullscreen enabled");
  } else {
    logEvent("Mobile mode");
  }

  startTimer();
};

// TIMER
function startTimer(){
  setInterval(()=>{
    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;

    document.getElementById("timer").textContent =
      `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    timeLeft--;

    if(timeLeft < 0){
      submitTest("Time expired");
    }
  },1000);
}

// FULLSCREEN EXIT
document.addEventListener("fullscreenchange", () => {

  if (!isMobile && supportsFullscreen) {

    if (!document.fullscreenElement && !allowExit) {
      controlPanel.style.display = "flex";
      logEvent("Fullscreen exited");
    } else {
      controlPanel.style.display = "none";
      logEvent("Fullscreen restored");
    }
  }
});

// REENTER
document.getElementById("reenterBtn").onclick = async () => {
  await document.documentElement.requestFullscreen().catch(()=>{});
  controlPanel.style.display = "none";
};

// TAB SWITCH
document.addEventListener("visibilitychange", () => {

  if (document.hidden && !allowExit) {

    tabSwitchCount++;
    logEvent("Tab switch detected");
    updateWarningDisplay();

    if (!isMobile && supportsFullscreen) {
      alert(`Warning (${tabSwitchCount}/${maxViolations})`);
    } else {
      tabWarning.style.display = "block";
      setTimeout(()=> tabWarning.style.display="none",4000);
    }

    if (tabSwitchCount >= maxViolations) {
      submitTest("Too many tab switches");
    }
  }
});

// EXIT ENABLE
confirmBox.addEventListener("change", () => {
  exitBtn.disabled = !confirmBox.checked;
});

// EXIT
exitBtn.onclick = () => {
  if(confirm("Exit test?")){
    submitTest("Exited");
  }
};

// SUBMIT
function submitTest(reason){
  allowExit = true;

  document.exitFullscreen?.().catch(()=>{});

  document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
      <h1>Test Ended</h1>
      <p>${reason}</p>
    </div>
  `;
}

</script>

</body>
</html>
