<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Online Test</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a2342;
  color: white;
  overflow: hidden;
}

/* START */
#warningScreen {
  position: fixed;
  inset: 0;
  background: #0a2342;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

/* TIMER */
#timer {
  position: fixed;
  top: 10px;
  right: 280px;
  background: black;
  padding: 10px;
  border-radius: 10px;
}

/* WARNING COUNTER */
#warningCounter {
  position: fixed;
  top: 60px;
  right: 280px;
  padding: 8px 15px;
  border-radius: 8px;
  font-weight: bold;
}

/* EXAM */
iframe {
  width: calc(100% - 260px);
  height: 100vh;
  border: none;
}

/* LOG */
#logBox {
  position: fixed;
  right: 0;
  width: 260px;
  height: 100vh;
  background: black;
  padding: 10px;
  color: #00ff00;
  overflow-y: auto;
}

/* EXIT */
#exitWrapper {
  position: fixed;
  right: 300px;
  top: 50%;
  transform: translateY(-50%);
  display: none;
  flex-direction: column;
  align-items: center;
}

#exitWarningText {
  background: #ffd700;
  color: black;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  width: 180px;
  text-align: center;
}

/* LOCKED STATE */
.locked {
  background: grey !important;
  cursor: not-allowed;
  opacity: 0.6;
}

/* FULLSCREEN BLOCK */
#controlPanel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 99999;
}

/* TAB WARNING */
#tabWarning {
  position: fixed;
  top: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  padding: 10px 20px;
  display: none;
}

/* MOBILE */
@media (max-width:768px){
  #logBox{display:none;}
  iframe{width:100%;}
  #timer,#warningCounter,#exitWrapper{right:20px;}
}
</style>
</head>

<body>

<div id="warningScreen">
  <h1>Secure Online Test</h1>
  <button id="startBtn">Start Test</button>
</div>

<div id="timer">40:00</div>
<div id="warningCounter">Warnings: 0 / 3</div>
<div id="tabWarning">⚠ Tab switching detected</div>

<div id="exitWrapper">
  <div id="exitWarningText">Submit before exiting</div>

  <label>
    <input type="checkbox" id="confirmSubmit">
    I have submitted
  </label>

  <button id="exitTestBtn" class="locked" disabled>Exit Test</button>
</div>

<div id="controlPanel">
  <h1>Fullscreen Required</h1>
  <button id="reenterBtn">RETURN</button>
</div>

<div id="logBox">
  <b>Log</b>
  <div id="logContent"></div>
</div>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScJkedBESwkGo2fnUQbkH_H-w9hvD4iN27I-5ca4h8pN3HuAg/viewform?embedded=true​"></iframe>

<script>

const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
const supportsFullscreen = !!document.documentElement.requestFullscreen;

let timeLeft = 40*60;
let tabSwitchCount = 0;
let maxViolations = 3;
let allowExit = false;

const exitBtn = document.getElementById("exitTestBtn");
const confirmBox = document.getElementById("confirmSubmit");

// LOG
function logEvent(m){
  document.getElementById("logContent").innerHTML += m+"<br>";
}

// WARNING COLOUR SYSTEM
function updateWarningDisplay(){
  let el = document.getElementById("warningCounter");
  el.textContent = `Warnings: ${tabSwitchCount} / ${maxViolations}`;

  if(tabSwitchCount <=1){
    el.style.background = "green";
  } else if(tabSwitchCount ==2){
    el.style.background = "orange";
  } else {
    el.style.background = "red";
  }
}

// START
document.getElementById("startBtn").onclick = async ()=>{
  document.getElementById("warningScreen").style.display="none";
  document.getElementById("exitWrapper").style.display="flex";

  if(!isMobile && supportsFullscreen){
    await document.documentElement.requestFullscreen();
  }

  setInterval(()=>{
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    document.getElementById("timer").textContent=`${m}:${s}`;
    timeLeft--;
  },1000);
};

// FULLSCREEN
document.addEventListener("fullscreenchange",()=>{
  if(!isMobile && !document.fullscreenElement){
    document.getElementById("controlPanel").style.display="flex";
  }
});

document.getElementById("reenterBtn").onclick=()=>{
  document.documentElement.requestFullscreen();
  document.getElementById("controlPanel").style.display="none";
};

// TAB SWITCH
document.addEventListener("visibilitychange",()=>{
  if(document.hidden && !allowExit){
    tabSwitchCount++;
    updateWarningDisplay();

    if(isMobile){
      let w=document.getElementById("tabWarning");
      w.style.display="block";
      setTimeout(()=>w.style.display="none",3000);
    } else {
      alert("Tab switch detected");
    }

    if(tabSwitchCount>=maxViolations){
      submitTest("Too many violations");
    }
  }
});

// EXIT LOCK SYSTEM
confirmBox.addEventListener("change",()=>{
  if(confirmBox.checked){
    exitBtn.disabled=false;
    exitBtn.classList.remove("locked");
    document.getElementById("exitWarningText").textContent="You may now exit";
  } else {
    exitBtn.disabled=true;
    exitBtn.classList.add("locked");
  }
});

// EXIT
exitBtn.onclick=()=>{
  if(confirm("Exit test?")){
    submitTest("Exited");
  }
};

function submitTest(reason){
  allowExit=true;
  document.body.innerHTML=`<h1>${reason}</h1>`;
}

</script>

</body>
</html>
