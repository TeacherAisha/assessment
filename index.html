<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Online Test</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a2342;
  color: white;
  overflow: hidden;
}

/* START SCREEN */
#warningScreen {
  position: fixed;
  inset: 0;
  background: #0a2342;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  text-align: center;
}

#startBtn {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  background: #00b894;
  color: white;
  margin-top: 20px;
}

/* TIMER */
#timer {
  position: fixed;
  top: 10px;
  right: 20px;
  background: black;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 22px;
  z-index: 1000;
}

/* FORM */
iframe {
  width: 100%;
  height: 100vh;
  border: none;
  padding-right: 220px;
  box-sizing: border-box;
}

/* EXIT UI */
#exitWrapper {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 999999;
  display: none;
  flex-direction: column;
  align-items: center;
}

#exitWarningText {
  background: #ffd700;
  color: black;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  width: 180px;
  text-align: center;
  font-weight: bold;
}

#exitTestBtn {
  padding: 15px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  width: 180px;
}

/* 🔴 BIG FULLSCREEN OVERLAY */
#controlPanel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  z-index: 99999;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#controlPanel h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

#reenterBtn {
  font-size: 30px;
  padding: 30px 50px;
  background: red;
  color: white;
  border: none;
  border-radius: 15px;
  cursor: pointer;
}

/* LOG */
#logBox {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: black;
  color: #00ff00;
  padding: 10px;
  font-size: 12px;
  z-index: 2000;
}

</style>
</head>

<body>

<div id="warningScreen">
  <h1>Secure Online Test</h1>
  <p>
    • 40-minute timer<br><br>
    • No tab switching<br><br>
    • Fullscreen required (desktop only)
  </p>
  <button id="startBtn">Start Test</button>
</div>

<div id="timer">40:00</div>

<div id="exitWrapper">
  <div id="exitWarningText">Submit your assessment before exiting.</div>
  <button id="exitTestBtn">Exit Test</button>
</div>

<!-- 🔴 BIG OVERLAY -->
<div id="controlPanel">
  <h1>Fullscreen Lost</h1>
  <p>Fullscreen lost and reported to admin</p>
  <button id="reenterBtn">RETURN TO FULLSCREEN</button>
</div>

<div id="logBox">
  <b>Activity Log</b>
  <div id="logContent"></div>
</div>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScJkedBESwkGo2fnUQbkH_H-w9hvD4iN27I-5ca4h8pN3HuAg/viewform?embedded=true"></iframe>

<script>

// -------- DEVICE DETECTION --------
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// -------- VARIABLES --------
let timeLeft = 40 * 60;
let tabSwitchCount = 0;
let maxViolations = 3;
let allowExit = false;
let watchdogInterval = null;
let activityLog = [];

// -------- ELEMENTS --------
const startBtn = document.getElementById("startBtn");
const warningScreen = document.getElementById("warningScreen");
const timerDisplay = document.getElementById("timer");
const controlPanel = document.getElementById("controlPanel");
const exitWrapper = document.getElementById("exitWrapper");

// -------- START --------
startBtn.addEventListener("click", async () => {

  if (!isMobile) {
    await document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    alert("Mobile mode: fullscreen not enforced");
  }

  warningScreen.style.display = "none";
  exitWrapper.style.display = "flex";

  startTimer();
  startWatchdog();
});

// -------- TIMER --------
function startTimer() {
  setInterval(() => {
    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;

    timerDisplay.textContent =
      `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    timeLeft--;

    if(timeLeft < 0){
      submitTest("Time expired");
    }

  },1000);
}

// -------- WATCHDOG --------
function startWatchdog() {

  watchdogInterval = setInterval(() => {

    if (!document.fullscreenElement && !allowExit && !isMobile) {
      controlPanel.style.display = "flex";
      logEvent("Fullscreen lost and reported to admin");
    }

  }, 500);
}

// -------- TAB SWITCH --------
document.addEventListener("visibilitychange", () => {

  if (document.hidden && !allowExit) {

    tabSwitchCount++;
    logEvent("Tab switch detected");

    alert(`Warning (${tabSwitchCount}/${maxViolations})`);

    if (tabSwitchCount >= maxViolations) {
      submitTest("Too many tab switches");
    }
  }
});

// -------- RE-ENTER --------
document.getElementById("reenterBtn").addEventListener("click", async () => {

  await document.documentElement.requestFullscreen().catch(()=>{});

  logEvent("Fullscreen restored");

  controlPanel.style.display = "none";
});

// -------- EXIT --------
document.getElementById("exitTestBtn").addEventListener("click", () => {

  if (!confirm("Exit test? Make sure you submitted.")) return;

  submitTest("Clean exit");
});

// -------- LOG --------
function logEvent(event){
  let t = new Date().toLocaleTimeString();
  activityLog.push(`${t} - ${event}`);
  document.getElementById("logContent").innerHTML =
    activityLog.join("<br>");
}

// -------- SUBMIT --------
function submitTest(reason){

  allowExit = true;

  if (watchdogInterval) clearInterval(watchdogInterval);

  document.exitFullscreen().catch(()=>{});

  alert("Test ended: " + reason);

  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0a2342;
      color:white;
      font-size:22px;
      text-align:center;
      flex-direction:column;
    ">
      <h1>Thank You</h1>
      <p>Thank you for submitting your work.</p>
    </div>
  `;
}

</script>

</body>
</html>
