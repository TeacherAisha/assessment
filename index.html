<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Online Test</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a2342;
  color: white;
  overflow: hidden;
}

/* START SCREEN */
#warningScreen {
  position: fixed;
  inset: 0;
  background: #0a2342;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  text-align: center;
}

#startBtn {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  background: #00b894;
  color: white;
  margin-top: 20px;
}

/* DESKTOP TIMER */
#timer {
  position: fixed;
  top: 10px;
  right: 280px;
  background: black;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 22px;
  z-index: 1000;
}

/* WARNING COUNTER */
#warningCounter {
  position: fixed;
  top: 60px;
  right: 280px;
  padding: 8px 15px;
  border-radius: 8px;
  font-weight: bold;
  z-index: 1000;
}

/* EXAM AREA */
iframe {
  width: calc(100% - 260px);
  height: 100vh;
  border: none;
}

/* LOG */
#logBox {
  position: fixed;
  top: 0;
  right: 0;
  width: 260px;
  height: 100vh;
  background: black;
  color: #00ff00;
  padding: 10px;
  font-size: 12px;
  overflow-y: auto;
}

/* EXIT WRAPPER */
#exitWrapper {
  position: fixed;
  right: 300px;
  top: 50%;
  transform: translateY(-50%);
  display: none;
  flex-direction: column;
  align-items: center;
  z-index: 9999;
}

#exitWarningText {
  background: #ffd700;
  color: black;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  width: 180px;
  text-align: center;
  font-weight: bold;
}

#exitTestBtn {
  padding: 15px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  width: 180px;
}

#exitTestBtn:disabled {
  background: grey;
  opacity: 0.6;
  cursor: not-allowed;
}

/* FULLSCREEN BLOCK */
#controlPanel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  z-index: 99999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* TAB WARNING */
#tabWarning {
  position: fixed;
  top: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  padding: 10px 20px;
  display: none;
  z-index: 99999;
}

/* ===================== */
/* MOBILE LAYOUT */
/* ===================== */
@media (max-width:768px){

  iframe {
    width: 100%;
    height: calc(100vh - 110px);
  }

  #logBox {
    display: none;
  }

  /* TOP BAR */
  #timer {
    top: 0;
    left: 0;
    right: 50%;
    width: 50%;
    height: 50px;

    display: flex;
    justify-content: center;
    align-items: center;

    border-radius: 0;
    font-size: 16px;
  }

  #warningCounter {
    top: 0;
    left: 50%;
    right: 0;
    width: 50%;
    height: 50px;

    display: flex;
    justify-content: center;
    align-items: center;

    border-radius: 0;
    font-size: 14px;
  }

  /* BOTTOM BAR */
  #exitWrapper {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    transform: none;

    flex-direction: row;
    justify-content: space-around;
    align-items: center;

    background: rgba(0,0,0,0.95);
    padding: 10px;
  }

  #exitWarningText {
    display: none;
  }

  #tabWarning {
    top: 60px;
  }
}
</style>
</head>

<body>

<!-- START -->
<div id="warningScreen">
  <h1>Secure Online Test</h1>
  <button id="startBtn">Start Test</button>
</div>

<!-- TOP INFO -->
<div id="timer">40:00</div>
<div id="warningCounter">Warnings: 0 / 3</div>
<div id="tabWarning">⚠ Tab switch detected</div>

<!-- EXIT -->
<div id="exitWrapper">
  <div id="exitWarningText">Submit before exiting</div>

  <label>
    <input type="checkbox" id="confirmSubmit">
    I have submitted
  </label>

  <button id="exitTestBtn" disabled>Exit Test</button>
</div>

<!-- FULLSCREEN -->
<div id="controlPanel">
  <h1>Fullscreen Required</h1>
  <button id="reenterBtn">RETURN</button>
</div>

<!-- LOG -->
<div id="logBox">
  <b>Activity Log</b>
  <div id="logContent"></div>
</div>

<!-- FORM -->
<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScJkedBESwkGo2fnUQbkH_H-w9hvD4iN27I-5ca4h8pN3HuAg/viewform?embedded=true​"></iframe>

<script>

const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
const supportsFullscreen = !!document.documentElement.requestFullscreen;

let timeLeft = 40 * 60;
let tabSwitchCount = 0;
let maxViolations = 3;
let allowExit = false;

const exitBtn = document.getElementById("exitTestBtn");
const confirmBox = document.getElementById("confirmSubmit");

/* LOG */
function logEvent(m){
  document.getElementById("logContent").innerHTML += m + "<br>";
}

/* WARNING COLOUR */
function updateWarningDisplay(){
  const el = document.getElementById("warningCounter");
  el.textContent = `Warnings: ${tabSwitchCount} / ${maxViolations}`;

  if(tabSwitchCount <= 1){
    el.style.background = "green";
  } else if(tabSwitchCount == 2){
    el.style.background = "orange";
  } else {
    el.style.background = "red";
  }
}

/* START */
document.getElementById("startBtn").onclick = async ()=>{
  document.getElementById("warningScreen").style.display="none";
  document.getElementById("exitWrapper").style.display="flex";

  if(!isMobile && supportsFullscreen){
    await document.documentElement.requestFullscreen().catch(()=>{});
  }

  setInterval(()=>{
    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;
    document.getElementById("timer").textContent =
      `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    timeLeft--;
  },1000);
};

/* FULLSCREEN */
document.addEventListener("fullscreenchange",()=>{
  if(!isMobile && !document.fullscreenElement){
    document.getElementById("controlPanel").style.display="flex";
  }
});

document.getElementById("reenterBtn").onclick=()=>{
  document.documentElement.requestFullscreen();
  document.getElementById("controlPanel").style.display="none";
};

/* TAB SWITCH */
document.addEventListener("visibilitychange",()=>{
  if(document.hidden && !allowExit){
    tabSwitchCount++;
    updateWarningDisplay();

    if(isMobile){
      let w=document.getElementById("tabWarning");
      w.style.display="block";
      setTimeout(()=>w.style.display="none",3000);
    } else {
      alert("Tab switch detected");
    }

    if(tabSwitchCount>=maxViolations){
      submitTest("Too many violations");
    }
  }
});

/* EXIT LOCK */
confirmBox.addEventListener("change",()=>{
  exitBtn.disabled = !confirmBox.checked;
});

/* EXIT */
exitBtn.onclick=()=>{
  if(confirm("Exit test?")){
    submitTest("Exited");
  }
};

/* SUBMIT */
function submitTest(reason){
  allowExit=true;
  document.body.innerHTML = `<h1>${reason}</h1>`;
}

</script>

</body>
</html>
